<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HP E~SPORTS | Pro Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0a;--bg2:#111;--card:#181818;--orange:#f97316;--orange-dim:rgba(249,115,22,0.15);
  --text:#f1f1f1;--muted:#888;--border:#262626;--red:#ef4444;--green:#22c55e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;padding-bottom:90px}

/* UI UTILS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin:12px;padding:16px}
.orange-btn{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-weight:700;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.orange-btn:disabled{background:#333;color:#666;cursor:not-allowed}
.cancel-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:12px;margin-top:8px;font-weight:600;cursor:pointer}
.input-field{width:100%;padding:12px;background:#222;border:1px solid var(--border);border-radius:10px;color:#fff;margin-top:5px;outline:none}
.label-sm{font-size:0.75rem;color:var(--muted);text-transform:uppercase;font-weight:600}

/* ADMIN PANEL (LARGE) */
.admin-screen{display:none;position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto}
.admin-screen.active{display:block}
.admin-header{background:var(--bg2);padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.admin-tab-box{display:flex;overflow-x:auto;padding:10px;gap:8px;background:#111}
.admin-tab{padding:8px 16px;background:var(--card);border:1px solid var(--border);border-radius:8px;white-space:nowrap;font-size:0.8rem;color:var(--muted)}
.admin-tab.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* REGISTRATION MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);width:100%;border-radius:20px;padding:24px;border:1px solid var(--orange-dim)}

/* TOAST */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:10px 20px;border-radius:30px;font-weight:700;z-index:2000;display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5)}

/* EXISTING STYLES REUSE */
.t-card{background:var(--card);margin:12px;border-radius:16px;border:1px solid var(--border);overflow:hidden}
.t-head{padding:12px;background:linear-gradient(to right, #1f1108, transparent);display:flex;justify-content:space-between;border-bottom:1px solid var(--border)}
.t-name{font-family:'Barlow Condensed';font-weight:800;font-size:1.1rem}
.t-body{padding:16px}
.slot-bar{height:6px;background:#333;border-radius:10px;margin:10px 0;overflow:hidden}
.slot-fill{height:100%;background:var(--orange);transition:width 0.5s}
.bottom-nav{position:fixed;bottom:0;width:100%;max-width:430px;background:#000;border-top:1px solid var(--border);display:flex;height:70px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);font-size:0.7rem}
.nav-item.active{color:var(--orange)}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="modal-overlay" id="join-modal">
  <div class="modal-box">
    <h2 id="m-title" style="font-family:'Barlow Condensed';margin-bottom:5px">TOURNAMENT JOIN</h2>
    <p id="m-sub" style="font-size:0.8rem;color:var(--muted);margin-bottom:20px"></p>
    
    <div id="join-form" style="display:flex;flex-direction:column;gap:12px">
      </div>
    
    <div style="margin-top:20px">
      <button class="orange-btn" id="btn-confirm-join" onclick="submitJoin()">Confirm Registration</button>
      <button class="cancel-btn" onclick="closeModal()">Back / Cancel</button>
    </div>
  </div>
</div>

<div id="screen-home">
  <div style="padding:20px;text-align:center">
    <h1 style="font-family:'Barlow Condensed';font-size:2rem;letter-spacing:1px">HP E~<span style="color:var(--orange)">SPORTS</span></h1>
  </div>
  <div id="tournaments-list">
    </div>
</div>

<div class="admin-screen" id="admin-panel">
  <div class="admin-header">
    <h2 style="font-family:'Barlow Condensed'">ADMIN <span style="color:var(--orange)">DASHBOARD</span></h2>
    <button onclick="closeAdmin()" style="background:var(--red);color:#fff;border:none;padding:5px 12px;border-radius:5px">Exit</button>
  </div>
  <div class="admin-tab-box">
    <button class="admin-tab active">Tournaments</button>
    <button class="admin-tab" onclick="showToast('Loading Users...')">Users</button>
    <button class="admin-tab" onclick="showToast('Loading Payments...')">Payments</button>
  </div>
  
  <div class="card">
    <h3 class="label-sm" style="margin-bottom:15px;color:var(--orange)">Create Tournament</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input class="input-field" id="adm-name" placeholder="Tournament Name">
      <div style="display:flex;gap:10px">
        <select class="input-field" id="adm-mode" style="flex:1"><option value="solo">Solo</option><option value="squad">Squad</option></select>
        <input class="input-field" id="adm-slots" type="number" placeholder="Total Slots (e.g. 12)" style="flex:1">
      </div>
      <input class="input-field" id="adm-fee" type="number" placeholder="Entry Fee (0 for Free)">
      <button class="orange-btn" onclick="createTournament()">Publish Tournament</button>
    </div>
  </div>
  
  <div id="admin-list" style="padding:12px">
    </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="location.reload()">
    <span>🏆</span><span>Tournaments</span>
  </div>
  <div class="nav-item" onclick="openAdminLogin()">
    <span>⚙️</span><span>Admin</span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, query, where, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDK2pAl2aJdglZ83i-JulG_jVnfMtAiavo",
  authDomain: "hp-esports-d6d7f.firebaseapp.com",
  projectId: "hp-esports-d6d7f",
  storageBucket: "hp-esports-d6d7f.firebasestorage.app",
  messagingSenderId: "747036339769",
  appId: "1:747036339769:web:60509582410c3d4cb60b71"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let selectedT = null;
const userEmail = "kingshadinop44@gmail.com"; // Default user for this logic

// --- LOAD TOURNAMENTS ---
async function loadTournaments() {
  const q = query(collection(db, "tournaments"), orderBy("createdAt", "desc"));
  const snap = await getDocs(q);
  const container = document.getElementById('tournaments-list');
  container.innerHTML = '';

  snap.forEach(d => {
    const t = d.data();
    const tId = d.id;
    const filled = t.registered || 0;
    const total = t.slots || 12;
    const percent = (filled / total) * 100;
    const isFull = filled >= total;

    container.innerHTML += `
      <div class="t-card">
        <div class="t-head">
          <span class="t-name">${t.name}</span>
          <span style="color:var(--orange);font-weight:700">৳${t.fee}</span>
        </div>
        <div class="t-body">
          <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:5px">
            <span style="color:var(--muted)">Mode: ${t.mode.toUpperCase()}</span>
            <span>${filled}/${total} Slots Filled</span>
          </div>
          <div class="slot-bar"><div class="slot-fill" style="width:${percent}%"></div></div>
          <button class="orange-btn" style="margin-top:10px" 
            ${isFull ? 'disabled' : ''} 
            onclick="openJoinModal('${tId}', '${t.name}', '${t.mode}', ${t.fee}, ${filled}, ${total})">
            ${isFull ? 'MATCH FULL' : 'JOIN NOW'}
          </button>
        </div>
      </div>
    `;
  });
  loadAdminList(snap);
}

// --- OPEN MODAL ---
window.openJoinModal = async (id, name, mode, fee, filled, total) => {
  // 1. Double Registration Check
  const regCheck = await getDocs(query(collection(db, "registrations"), where("tId", "==", id), where("email", "==", userEmail)));
  if(!regCheck.empty){
    showToast("⚠️ আপনি অলরেডি জয়েন করেছেন!");
    return;
  }

  selectedT = { id, name, mode, fee, filled, total };
  document.getElementById('m-title').innerText = name;
  document.getElementById('m-sub').innerText = `${mode.toUpperCase()} | Entry: ৳${fee}`;
  
  const form = document.getElementById('join-form');
  form.innerHTML = `
    <div><span class="label-sm">In-Game Name</span><input class="input-field" id="f-ign" placeholder="Your IGN"></div>
    <div><span class="label-sm">Free Fire UID</span><input class="input-field" id="f-uid" placeholder="Your UID"></div>
    ${mode === 'squad' ? '<div><span class="label-sm">Team Name</span><input class="input-field" id="f-team" placeholder="Team Name"></div>' : ''}
  `;
  
  document.getElementById('join-modal').style.display = 'flex';
};

// --- SUBMIT REGISTRATION ---
window.submitJoin = async () => {
  const ign = document.getElementById('f-ign').value;
  const uid = document.getElementById('f-uid').value;
  const btn = document.getElementById('btn-confirm-join');

  if(!ign || !uid){ showToast("সব তথ্য দিন!"); return; }

  try {
    btn.disabled = true;
    btn.innerText = "Processing...";

    // Final Slot Check
    const tRef = doc(db, "tournaments", selectedT.id);
    const tSnap = await getDoc(tRef);
    if(tSnap.data().registered >= tSnap.data().slots){
      showToast("❌ দুঃখিত, স্লট ফুল হয়ে গেছে!");
      closeModal();
      return;
    }

    // Save Reg
    await addDoc(collection(db, "registrations"), {
      tId: selectedT.id,
      tName: selectedT.name,
      email: userEmail,
      ign, uid,
      createdAt: serverTimestamp()
    });

    // Update Tournament Counter
    await updateDoc(tRef, { registered: (tSnap.data().registered || 0) + 1 });

    showToast("✅ Registration Successful!");
    closeModal();
    loadTournaments();
  } catch (e) {
    showToast("Error! Try again.");
    btn.disabled = false;
  }
};

// --- ADMIN LOGIC ---
window.createTournament = async () => {
  const name = document.getElementById('adm-name').value;
  const mode = document.getElementById('adm-mode').value;
  const slots = parseInt(document.getElementById('adm-slots').value);
  const fee = parseInt(document.getElementById('adm-fee').value);

  if(!name || !slots){ showToast("সব ফিল্ড পূরণ করুন!"); return; }

  await addDoc(collection(db, "tournaments"), {
    name, mode, slots, fee, registered: 0, createdAt: serverTimestamp()
  });
  showToast("Tournament Published!");
  loadTournaments();
};

window.openAdminLogin = () => {
  const pass = prompt("Admin Password:");
  if(pass === "123"){ 
    document.getElementById('admin-panel').classList.add('active');
    loadTournaments();
  } else { showToast("ভুল পাসওয়ার্ড!"); }
};

window.closeAdmin = () => document.getElementById('admin-panel').classList.remove('active');
window.closeModal = () => document.getElementById('join-modal').style.display = 'none';

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

async function loadAdminList(snap){
  const list = document.getElementById('admin-list');
  list.innerHTML = '<h3 class="label-sm">Manage Tournaments</h3>';
  snap.forEach(d => {
    const t = d.data();
    list.innerHTML += `
      <div style="background:#222;padding:10px;border-radius:8px;margin-top:8px;display:flex;justify-content:space-between">
        <span>${t.name} (${t.registered}/${t.slots})</span>
        <button style="color:var(--red);background:none;border:none">Delete</button>
      </div>
    `;
  });
}

loadTournaments();
</script>
</body>
</html>
